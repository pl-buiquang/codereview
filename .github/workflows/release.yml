# Release pipeline (Spec 06).
#
# Trigger: push a tag matching app-v* (e.g. app-v0.1.0, app-v0.1.0-rc.1).
# Output:  a DRAFT GitHub Release for the tag with unsigned bundles for
#          macOS (arm64 + x64 .dmg/.app), Windows (.msi + NSIS -setup.exe),
#          Linux (.deb/.rpm/.AppImage). Publish the draft by hand.
#
# Version policy: the tag's X.Y.Z stem (app-v stripped, pre-release suffix
# stripped) MUST equal `version` in src-tauri/tauri.conf.json — the guard
# step below fails the run otherwise. Artifact filenames use the conf
# version; the release name uses the tag.
#
# Extension points (do not restructure when adding these):
#   Spec 07 — updater: add TAURI_SIGNING_PRIVATE_KEY{,_PASSWORD} to the
#             tauri-action `env:` block and `includeUpdaterJson: true` to
#             its `with:` block.
#   Spec 08 — signing: add the conditional Apple/Windows signing env vars
#             to the same `env:` block.
name: release

on:
  push:
    tags:
      - "app-v*"

permissions:
  contents: write # create the draft release + upload assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust-target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            rust-target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - platform: windows-latest
            rust-target: ""
            args: ""
          - platform: ubuntu-22.04
            rust-target: ""
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Check tag matches tauri.conf.json version
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME#app-v}"   # 0.1.0-rc.1
          stem="${tag%%-*}"                # 0.1.0
          conf="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          if [ "$stem" != "$conf" ]; then
            echo "::error::tag stem $stem != tauri.conf.json version $conf"
            exit 1
          fi

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          # Keep in sync with specs/05-*.md (Tauri v2 prerequisites, webkitgtk 4.1).
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: pnpm/action-setup@v4 # version comes from package.json "packageManager" (Spec 04)

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc # pinned by Spec 04
          cache: pnpm

      - name: Install Rust toolchain (honors rust-toolchain.toml from Spec 04)
        shell: bash
        run: rustup show active-toolchain || rustup toolchain install

      - name: Add macOS cross-compile target
        if: matrix.rust-target != ''
        run: rustup target add ${{ matrix.rust-target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.rust-target }} # arm64/x64 mac builds must not share a cache

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Spec 08: stage code-signing secrets ONLY when non-empty. Do NOT move
      # these into the tauri-action env: block — a missing GH secret resolves
      # to "" and tauri-bundler gates signing on env-var *presence* (var_os,
      # no is_empty), so a set-but-empty APPLE_CERTIFICATE fails the build
      # importing an empty .p12. Unset vars => unsigned build, green run.
      # See docs/signing.md.
      - name: Stage code-signing secrets (unsigned build when absent)
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          present() { [ -n "${!1}" ]; }
          stage() {
            name="$1"
            if present "$name"; then
              eof="EOF_${name}_${RANDOM}${RANDOM}"
              { echo "${name}<<${eof}"; echo "${!name}"; echo "${eof}"; } >> "$GITHUB_ENV"
              echo "staged ${name}"
            fi
          }
          count() { local n=0 v; for v in "$@"; do if present "$v"; then n=$((n+1)); fi; done; echo "$n"; }

          # Pair/trio guards — partial sets are operator error; fail fast here
          # with a readable message instead of mid-cargo (or silently unsigned).
          pair="$(count APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD)"
          if [ "$pair" = "1" ]; then
            echo "::error::APPLE_CERTIFICATE and APPLE_CERTIFICATE_PASSWORD must be set together (docs/signing.md §2)"; exit 1
          fi
          trio="$(count APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID)"
          if [ "$trio" != "0" ] && [ "$trio" != "3" ]; then
            echo "::error::set all of APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID, or none (docs/signing.md §2)"; exit 1
          fi
          az="$(count AZURE_TENANT_ID AZURE_CLIENT_ID AZURE_CLIENT_SECRET)"
          if [ "$az" != "0" ] && [ "$az" != "3" ]; then
            echo "::error::set all of AZURE_TENANT_ID / AZURE_CLIENT_ID / AZURE_CLIENT_SECRET, or none (docs/signing.md §3)"; exit 1
          fi
          if [ "$trio" = "3" ] && [ "$pair" = "0" ]; then
            echo "::warning::notarization secrets set without APPLE_CERTIFICATE — notarization only runs on signed builds (docs/signing.md §2)"
          fi

          for v in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY \
                   APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID \
                   AZURE_TENANT_ID AZURE_CLIENT_ID AZURE_CLIENT_SECRET; do
            stage "$v"
          done

      - name: Build and upload to draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Spec 07: minisign updater signing keys (set via `gh secret set`).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple/Windows signing env arrives via GITHUB_ENV from the
          # "Stage code-signing secrets" step above — never reference those
          # secrets here directly (empty string != unset for tauri-bundler).
          # See docs/signing.md.
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "codereview ${{ github.ref_name }}"
          includeUpdaterJson: true
          releaseBody: |
            Unsigned build — see assets below.

            macOS: the app is not notarized; after installing, run
            `xattr -dr com.apple.quarantine /Applications/codereview.app`
            (or right-click → Open). Windows: SmartScreen will warn; choose
            "Run anyway".
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
